services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://anlp:anlp@db:5432/anlp
      - PORT=3000
    depends_on:
      - db
    restart: on-failure

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: anlp
      POSTGRES_PASSWORD: anlp
      POSTGRES_DB: anlp
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: always

volumes:
  pgdata:
